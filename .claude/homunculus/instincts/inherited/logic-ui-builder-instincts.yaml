# Logic Ui Builder Workflow Add New Ui Section Or Component

## Action

Follow the add-new-ui-section-or-component workflow:
1. Create new component file(s) under components/[area]/
2. Update the parent page/component to include the new section/component
3. Optionally update related style files (e.g., page.module.css)
4. Optionally update navigation or related UI

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: components/landing/*.tsx, components/dashboard/*.tsx, components/billing/*.tsx

