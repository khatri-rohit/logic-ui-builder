# Logic Ui Builder Workflow Integrate New Billing Or Pricing Feature

## Action

Follow the integrate-new-billing-or-pricing-feature workflow:
1. Create or update API route(s) under app/api/billing/
2. Update or add new components under components/billing/ or components/dashboard/
3. Modify or extend billing logic in lib/ (e.g., lib/billing, lib/plans, lib/razorpay)
4. Update Prisma schema and generate new migration(s)
5. Update or add relevant pages (e.g., app/billing/...)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: app/api/billing/*.ts, components/billing/*.tsx, components/dashboard/*.tsx

